<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>介護食事記録</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary:#1565C0; --primary-light:#1976D2; --primary-bg:#E3F2FD;
      --accent:#2E7D32; --accent-light:#43A047;
      --warn:#E65100; --danger:#C62828;
      --bg:#F0F4F8; --card:#FFFFFF; --text:#1A1A2E; --text-sub:#546E7A;
      --border:#CFD8DC; --header-h:56px; --safe-top:env(safe-area-inset-top,0px);
    }
    body { font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;
      background:var(--bg); color:var(--text); min-height:100vh;
      font-size:16px; -webkit-tap-highlight-color:transparent; }

    /* ── ログイン画面 ── */
    #screenLogin {
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center; padding:32px 24px; gap:32px;
    }
    .login-logo { font-size:64px; }
    .login-title { font-size:24px; font-weight:700; text-align:center; }
    .login-sub   { font-size:14px; color:var(--text-sub); text-align:center; line-height:1.6; }
    .btn-google  {
      display:flex; align-items:center; gap:12px;
      background:#fff; border:1.5px solid var(--border); border-radius:14px;
      padding:14px 24px; font-size:16px; font-weight:600; cursor:pointer;
      box-shadow:0 2px 8px rgba(0,0,0,.1); width:100%; justify-content:center;
    }
    .btn-google:active { transform:scale(.97); }
    .google-icon { width:24px; height:24px; }

    /* ── ヘッダー ── */
    .header {
      position:fixed; top:0; left:0; right:0; z-index:200;
      background:var(--primary); color:#fff;
      height:calc(var(--header-h) + var(--safe-top));
      padding-top:var(--safe-top);
      display:flex; align-items:center; padding-left:4px; padding-right:4px;
      box-shadow:0 2px 8px rgba(0,0,0,.3);
    }
    .header-btn {
      width:44px; height:44px; display:flex; align-items:center; justify-content:center;
      border:none; background:transparent; color:#fff; font-size:22px;
      cursor:pointer; border-radius:22px; flex-shrink:0;
    }
    .header-btn:active { background:rgba(255,255,255,.2); }
    .header-title { flex:1; font-size:17px; font-weight:600; text-align:center;
      padding:0 4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .header-right { display:flex; align-items:center; gap:4px; flex-shrink:0; }
    .user-avatar {
      width:32px; height:32px; border-radius:16px;
      background:rgba(255,255,255,.3); display:flex; align-items:center;
      justify-content:center; font-size:14px; font-weight:700; color:#fff;
      cursor:pointer; border:none;
    }

    /* ── スクリーン ── */
    .screen { display:none; padding-top:calc(var(--header-h) + var(--safe-top));
      min-height:100vh; padding-bottom:80px; }
    .screen.active { display:block; }

    /* ── 利用者リスト ── */
    .resident-list { padding:12px; display:flex; flex-direction:column; gap:10px; }
    .resident-card {
      background:var(--card); border-radius:14px; padding:16px;
      display:flex; align-items:center; gap:14px;
      box-shadow:0 1px 4px rgba(0,0,0,.08); cursor:pointer;
    }
    .resident-card:active { transform:scale(.97); }
    .resident-avatar {
      width:48px; height:48px; border-radius:24px;
      background:var(--primary-bg); color:var(--primary);
      font-size:22px; font-weight:700; display:flex;
      align-items:center; justify-content:center; flex-shrink:0;
    }
    .resident-info  { flex:1; min-width:0; }
    .resident-name  { font-size:17px; font-weight:600; white-space:nowrap;
      overflow:hidden; text-overflow:ellipsis; }
    .resident-meta  { font-size:13px; color:var(--text-sub); margin-top:2px; }
    .resident-arrow { color:var(--border); font-size:18px; }

    /* ── 空状態 ── */
    .empty-state { text-align:center; padding:60px 24px 24px; color:var(--text-sub); }
    .empty-icon  { font-size:56px; margin-bottom:12px; }
    .empty-text  { font-size:15px; line-height:1.6; }

    /* ── FAB ── */
    .fab {
      position:fixed; bottom:calc(24px + env(safe-area-inset-bottom,0px));
      right:20px; width:58px; height:58px; border-radius:29px;
      background:var(--primary); color:#fff; border:none;
      font-size:26px; display:flex; align-items:center; justify-content:center;
      box-shadow:0 4px 16px rgba(21,101,192,.5); cursor:pointer; z-index:100;
    }
    .fab:active { transform:scale(.93); }

    /* ── 記録カード ── */
    .record-list { padding:12px; display:flex; flex-direction:column; gap:10px; }
    .record-card { background:var(--card); border-radius:14px; overflow:hidden;
      box-shadow:0 1px 4px rgba(0,0,0,.08); }
    .record-card-header {
      display:flex; align-items:center; padding:12px 14px 10px; gap:10px;
    }
    .mealtime-badge {
      font-size:12px; font-weight:600; padding:3px 9px; border-radius:10px;
      background:var(--primary-bg); color:var(--primary);
    }
    .record-date  { font-size:13px; color:var(--text-sub); flex:1; }
    .record-del   {
      width:32px; height:32px; border-radius:16px;
      border:none; background:transparent; color:#B0BEC5;
      font-size:16px; cursor:pointer; display:flex;
      align-items:center; justify-content:center;
    }
    .record-del:active { background:#FFEBEE; color:var(--danger); }
    .record-body  { display:flex; gap:12px; padding:0 14px 14px; }
    .record-thumb {
      width:72px; height:72px; border-radius:10px; object-fit:cover;
      background:var(--bg); flex-shrink:0; border:1px solid var(--border);
    }
    .record-thumb-ph {
      width:72px; height:72px; border-radius:10px; background:var(--bg);
      display:flex; align-items:center; justify-content:center; font-size:28px;
      flex-shrink:0; border:1px solid var(--border);
    }
    .record-details { flex:1; min-width:0; }
    .amount-label   { display:flex; justify-content:space-between; margin-bottom:4px; }
    .amount-text    { font-size:16px; font-weight:700; }
    .amount-pct     { font-size:14px; color:var(--text-sub); }
    .amount-bar     { height:8px; border-radius:4px; background:var(--border); overflow:hidden; }
    .amount-fill    { height:100%; border-radius:4px; }
    .record-texture { font-size:12px; color:var(--text-sub); margin-top:4px; }
    .record-comment { font-size:13px; color:var(--text-sub); margin-top:4px; line-height:1.5; }
    .record-note    { font-size:13px; color:var(--text); margin-top:4px;
      padding:6px 8px; background:#FFF9C4; border-radius:6px; line-height:1.5; }

    /* ── フォーム ── */
    .form-section   { background:var(--card); margin:12px; border-radius:14px;
      overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.08); }
    .form-sec-title { font-size:13px; font-weight:600; color:var(--text-sub);
      text-transform:uppercase; letter-spacing:.5px; padding:14px 16px 6px; }
    .form-row       { padding:10px 16px; border-top:1px solid var(--border); }
    .form-label     { font-size:14px; color:var(--text-sub); margin-bottom:6px; display:block; }
    .form-select, .form-input, .form-textarea {
      width:100%; font-size:16px; font-family:inherit; color:var(--text);
      background:var(--bg); border:1.5px solid var(--border); border-radius:10px;
      padding:10px 12px; -webkit-appearance:none; outline:none;
    }
    .form-select:focus,.form-input:focus,.form-textarea:focus { border-color:var(--primary-light); }
    .form-select-wrap { position:relative; }
    .form-select-wrap::after { content:'▾'; position:absolute; right:14px; top:50%;
      transform:translateY(-50%); color:var(--text-sub); pointer-events:none; }
    .form-textarea  { resize:none; height:80px; line-height:1.5; }
    .voice-row      { display:flex; gap:8px; align-items:flex-start; }
    .voice-row .form-textarea { flex:1; }

    /* 音声ボタン */
    .voice-btn {
      width:44px; height:44px; border-radius:22px; border:2px solid var(--border);
      background:var(--bg); font-size:20px; cursor:pointer; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      transition:all .2s; margin-top:0;
    }
    .voice-btn.recording {
      border-color:var(--danger); background:#FFEBEE;
      animation:pulse .8s infinite;
    }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.12)} }

    /* ── 写真エリア ── */
    .photo-area     { margin:12px; }
    .photo-preview  { width:100%; aspect-ratio:4/3; border-radius:14px;
      object-fit:cover; display:none; background:#000; }
    .photo-ph       {
      width:100%; aspect-ratio:4/3; border-radius:14px;
      background:var(--card); border:2px dashed var(--border);
      display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:8px; cursor:pointer;
    }
    .photo-ph-icon  { font-size:48px; }
    .photo-ph-text  { font-size:14px; color:var(--text-sub); }
    .photo-btn-row  { display:flex; gap:8px; margin-top:10px; }

    /* ── AI結果 ── */
    .ai-result      { margin:12px; background:var(--card); border-radius:14px;
      padding:16px; border-left:4px solid var(--primary-light);
      box-shadow:0 1px 4px rgba(0,0,0,.08); display:none; }
    .ai-result.show { display:block; }
    .ai-title       { font-size:12px; font-weight:600; color:var(--primary);
      text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; }
    .ai-amount-big  { font-size:28px; font-weight:700; margin-bottom:4px; }
    .ai-pct-text    { font-size:14px; color:var(--text-sub); margin-bottom:10px; }
    .ai-bar         { height:12px; border-radius:6px; background:var(--border);
      overflow:hidden; margin-bottom:12px; }
    .ai-bar-fill    { height:100%; border-radius:6px; transition:width .6s ease; }
    .ai-comment     { font-size:14px; color:var(--text-sub); line-height:1.6; }

    /* ── 量セレクター ── */
    .amount-selector { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .amount-opt     {
      padding:12px 6px; border-radius:10px; border:2px solid var(--border);
      background:var(--bg); text-align:center; cursor:pointer; transition:all .15s;
    }
    .amount-opt.selected { border-color:var(--primary); background:var(--primary-bg); }
    .amount-opt-lbl  { font-size:13px; font-weight:600; }
    .amount-opt-pct  { font-size:12px; color:var(--text-sub); margin-top:2px; }

    /* ── ボタン ── */
    .btn { display:flex; align-items:center; justify-content:center; gap:6px;
      padding:14px 20px; border-radius:14px; border:none;
      font-size:16px; font-weight:600; font-family:inherit; cursor:pointer; }
    .btn:active { transform:scale(.97); }
    .btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .btn-primary  { background:var(--primary); color:#fff; flex:1; }
    .btn-secondary{ background:var(--bg); color:var(--text); border:1.5px solid var(--border); }
    .btn-accent   { background:var(--accent); color:#fff; }
    .btn-full     { width:100%; }
    .btn-sm       { padding:10px 16px; font-size:14px; }
    .action-bar   { padding:12px; display:flex; flex-direction:column; gap:10px; }

    /* ── 統計 ── */
    .stats-bar     { display:flex; gap:8px; padding:8px 12px 4px; flex-wrap:wrap; }
    .stat-chip     { background:var(--card); border-radius:20px; padding:6px 12px;
      font-size:13px; color:var(--text-sub); box-shadow:0 1px 3px rgba(0,0,0,.08); }
    .stat-chip strong { color:var(--text); }
    .section-hdr   { padding:16px 12px 4px; font-size:13px; font-weight:600;
      color:var(--text-sub); text-transform:uppercase; letter-spacing:.5px; }

    /* ── 色クラス ── */
    .c100{background:#2E7D32} .c75{background:#1565C0}
    .c50{background:#F9A825}  .c25{background:#E65100} .c10{background:#C62828}

    /* ── ローディング ── */
    .loading-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.5);
      z-index:999; align-items:center; justify-content:center;
      flex-direction:column; gap:16px;
    }
    .loading-overlay.show { display:flex; }
    .spinner { width:52px; height:52px; border:4px solid rgba(255,255,255,.3);
      border-top-color:#fff; border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .loading-text { color:#fff; font-size:16px; font-weight:600; }

    /* ── トースト ── */
    .toast {
      position:fixed; bottom:calc(80px + env(safe-area-inset-bottom,0px));
      left:50%; transform:translateX(-50%) translateY(100px);
      background:#323232; color:#fff; padding:12px 20px; border-radius:24px;
      font-size:14px; font-weight:500; z-index:500; transition:transform .3s;
      white-space:nowrap; max-width:90vw;
    }
    .toast.show    { transform:translateX(-50%) translateY(0); }
    .toast.success { background:var(--accent); }
    .toast.error   { background:var(--danger); }

    /* ── モーダル ── */
    .modal-overlay {
      display:none; position:fixed; inset:0; background:rgba(0,0,0,.4);
      z-index:300; align-items:flex-end; justify-content:center;
    }
    .modal-overlay.show { display:flex; }
    .modal {
      background:var(--card); border-radius:20px 20px 0 0;
      padding:24px 20px calc(24px + env(safe-area-inset-bottom,0px));
      width:100%; max-width:480px;
    }
    .modal-title { font-size:18px; font-weight:700; margin-bottom:12px; text-align:center; }
    .modal-sub   { font-size:14px; color:var(--text-sub); text-align:center; line-height:1.6; }
    .modal-actions { display:flex; flex-direction:column; gap:10px; margin-top:16px; }
  </style>
</head>
<body>

<!-- Firebase SDK (compat) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<!-- ローディング -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">読み込み中...</div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<!-- ヘッダー -->
<div class="header" id="header" style="display:none">
  <button class="header-btn" id="headerBack" style="display:none" onclick="goBack()">‹</button>
  <div class="header-title" id="headerTitle">介護食事記録</div>
  <div class="header-right" id="headerRight">
    <button class="user-avatar" id="userAvatar" onclick="showLogoutModal()"></button>
  </div>
</div>

<!-- ============================
     ログイン画面
     ============================ -->
<div id="screenLogin">
  <div class="login-logo">🏥</div>
  <div>
    <div class="login-title">介護食事記録</div>
    <div class="login-sub" style="margin-top:8px">
      写真 × AI で食事摂取量を<br>かんたん記録
    </div>
  </div>
  <button class="btn-google" onclick="signInWithGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Googleでログイン
  </button>
  <div style="font-size:12px;color:var(--text-sub);text-align:center">
    Googleアカウントで安全にログイン
  </div>
</div>

<!-- ============================
     ホーム
     ============================ -->
<div class="screen" id="screenHome">
  <div class="resident-list" id="residentList"></div>
  <div class="empty-state" id="homeEmpty" style="display:none">
    <div class="empty-icon">👴</div>
    <div class="empty-text">利用者がまだ登録されていません<br>右下の＋ボタンで追加してください</div>
  </div>
  <button class="fab" onclick="showAddResident()">＋</button>
</div>

<!-- ============================
     利用者追加
     ============================ -->
<div class="screen" id="screenAddResident">
  <div style="padding:12px">
    <div class="form-section">
      <div class="form-sec-title">基本情報</div>
      <div class="form-row">
        <label class="form-label">氏名 *</label>
        <input type="text" class="form-input" id="addName"
          placeholder="例: 山田 太郎" autocomplete="off" enterkeyhint="next">
      </div>
      <div class="form-row">
        <label class="form-label">部屋番号</label>
        <input type="text" class="form-input" id="addRoom"
          placeholder="例: 101号室" autocomplete="off">
      </div>
      <div class="form-row">
        <label class="form-label">通常の食事形態</label>
        <div class="form-select-wrap">
          <select class="form-select" id="addTexture">
            <option>普通食</option><option>刻み食</option><option>ミキサー食</option>
            <option>軟菜食</option><option>ペースト食</option><option>嚥下調整食</option>
          </select>
        </div>
      </div>
    </div>
    <div class="action-bar">
      <button class="btn btn-accent btn-full" onclick="addResident()">登録する</button>
      <button class="btn btn-secondary btn-full" onclick="goBack()">キャンセル</button>
    </div>
  </div>
</div>

<!-- ============================
     利用者詳細
     ============================ -->
<div class="screen" id="screenResident">
  <div class="stats-bar" id="residentStats"></div>
  <div class="section-hdr">食事記録</div>
  <div class="record-list" id="recordList"></div>
  <div class="empty-state" id="residentEmpty" style="display:none">
    <div class="empty-icon">🍱</div>
    <div class="empty-text">記録がまだありません<br>右下のボタンで記録を追加してください</div>
  </div>
  <button class="fab" onclick="showNewRecord()">📷</button>
</div>

<!-- ============================
     新規記録
     ============================ -->
<div class="screen" id="screenNewRecord">
  <!-- 写真 -->
  <div class="photo-area">
    <img id="photoPreview" class="photo-preview" alt="食事写真">
    <div class="photo-ph" id="photoPlaceholder" onclick="triggerCamera()">
      <div class="photo-ph-icon">📷</div>
      <div class="photo-ph-text">タップして写真を撮影</div>
    </div>
    <input type="file" id="cameraInput" accept="image/*" capture="environment"
      style="display:none" onchange="onPhotoSelected(event)">
    <div class="photo-btn-row" id="photoBtnRow" style="display:none">
      <button class="btn btn-secondary btn-sm" style="flex:1" onclick="triggerCamera()">📷 撮り直す</button>
      <button class="btn btn-primary btn-sm" style="flex:1" id="analyzeBtn" onclick="analyzePhoto()">🤖 AI分析</button>
    </div>
  </div>

  <!-- AI結果 -->
  <div class="ai-result" id="aiResult">
    <div class="ai-title">🤖 Gemini 分析結果</div>
    <div class="ai-amount-big" id="aiAmount">—</div>
    <div class="ai-pct-text" id="aiPct">—</div>
    <div class="ai-bar"><div class="ai-bar-fill" id="aiBarFill" style="width:0"></div></div>
    <div class="ai-comment" id="aiComment"></div>
  </div>

  <!-- 摂取量 -->
  <div class="form-section">
    <div class="form-sec-title">摂取量を選択 *</div>
    <div class="form-row" style="border-top:none">
      <div class="amount-selector" id="amountSelector"></div>
    </div>
  </div>

  <!-- 詳細 -->
  <div class="form-section">
    <div class="form-sec-title">詳細</div>
    <div class="form-row">
      <label class="form-label">食事区分</label>
      <div class="form-select-wrap">
        <select class="form-select" id="newMealTime">
          <option>朝食</option><option>昼食</option>
          <option>夕食</option><option>おやつ</option><option>補食</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">食事形態</label>
      <div class="form-select-wrap">
        <select class="form-select" id="newMealTexture">
          <option>普通食</option><option>刻み食</option><option>ミキサー食</option>
          <option>軟菜食</option><option>ペースト食</option><option>嚥下調整食</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">
        備考
        <span id="voiceSupported" style="display:none; font-size:12px; margin-left:8px; color:var(--primary)">
          🎤 音声入力対応
        </span>
      </label>
      <div class="voice-row">
        <textarea class="form-textarea" id="newNote"
          placeholder="食欲の様子、特記事項など..."></textarea>
        <button class="voice-btn" id="voiceBtn" onclick="toggleVoice()"
          style="display:none" title="音声入力">🎤</button>
      </div>
    </div>
  </div>

  <div class="action-bar">
    <button class="btn btn-accent btn-full" onclick="saveRecord()">✓ 記録を保存</button>
    <button class="btn btn-secondary btn-full" onclick="goBack()">キャンセル</button>
  </div>
</div>

<!-- ログアウトモーダル -->
<div class="modal-overlay" id="logoutModal">
  <div class="modal">
    <div class="modal-title" id="logoutUserName">アカウント</div>
    <div class="modal-sub" id="logoutUserEmail"></div>
    <div class="modal-actions">
      <button class="btn btn-full" style="background:#C62828;color:#fff"
        onclick="signOut()">ログアウト</button>
      <button class="btn btn-secondary btn-full" onclick="closeModal('logoutModal')">閉じる</button>
    </div>
  </div>
</div>

<!-- 利用者削除モーダル -->
<div class="modal-overlay" id="deleteResidentModal">
  <div class="modal">
    <div class="modal-title">利用者を削除しますか？</div>
    <div class="modal-sub">この操作は取り消せません。<br>すべての食事記録も削除されます。</div>
    <div class="modal-actions">
      <button class="btn btn-full" style="background:#C62828;color:#fff"
        onclick="confirmDeleteResident()">削除する</button>
      <button class="btn btn-secondary btn-full" onclick="closeModal('deleteResidentModal')">キャンセル</button>
    </div>
  </div>
</div>

<script>
// ============================
// 状態
// ============================
const S = {
  user: null,
  residents: [],
  records: [],
  currentResident: null,
  photoFull: null,    // AI分析用（最大1280px）
  photoThumb: null,   // 保存用（200px）
  aiResult: null,
  selectedIdx: null,
  deleteTargetId: null,
};

const AMOUNTS = [
  { label:'全量',          pct:100 },
  { label:'3/4量',         pct:75  },
  { label:'半量',          pct:50  },
  { label:'1/4量',         pct:25  },
  { label:'ほとんど食べず', pct:10  },
  { label:'食べず',        pct:0   },
];

const screenStack = [];

// ============================
// Firebase 初期化
// ============================
async function initFirebase() {
  showLoading('起動中...');
  try {
    const cfg = await fetch('/api/firebase-config').then(r => r.json());
    firebase.initializeApp(cfg);

    firebase.auth().onAuthStateChanged(user => {
      hideLoading();
      if (user) {
        S.user = user;
        document.getElementById('screenLogin').style.display = 'none';
        document.getElementById('header').style.display = '';
        const av = document.getElementById('userAvatar');
        av.textContent = user.displayName?.charAt(0) || user.email?.charAt(0) || '?';
        initApp();
      } else {
        S.user = null;
        document.getElementById('screenLogin').style.display = '';
        document.getElementById('header').style.display = 'none';
      }
    });
  } catch (e) {
    hideLoading();
    showToast('起動エラー: ' + e.message, 'error');
  }
}

async function getToken() {
  if (!S.user) throw new Error('未ログイン');
  return S.user.getIdToken();
}

async function api(path, options = {}) {
  const token = await getToken();
  const r = await fetch(path, {
    ...options,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
      ...(options.headers || {}),
    },
    body: options.body ? (typeof options.body === 'string' ? options.body : JSON.stringify(options.body)) : undefined,
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({ error: `HTTP ${r.status}` }));
    throw new Error(err.error || `HTTP ${r.status}`);
  }
  return r.json();
}

// ============================
// 認証
// ============================
async function signInWithGoogle() {
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    await firebase.auth().signInWithPopup(provider);
  } catch (e) {
    if (e.code !== 'auth/popup-closed-by-user') {
      showToast('ログイン失敗: ' + e.message, 'error');
    }
  }
}

function showLogoutModal() {
  document.getElementById('logoutUserName').textContent =
    S.user?.displayName || 'アカウント';
  document.getElementById('logoutUserEmail').textContent =
    S.user?.email || '';
  openModal('logoutModal');
}

async function signOut() {
  closeModal('logoutModal');
  await firebase.auth().signOut();
  screenStack.length = 0;
  showScreen('screenHome');
}

// ============================
// アプリ初期化
// ============================
async function initApp() {
  initVoice();
  buildAmountSelector();
  showScreen('screenHome');
  updateHeader('介護食事記録', false);
  await loadResidents();
}

// ============================
// 画面遷移
// ============================
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
  window.scrollTo(0, 0);
}

function updateHeader(title, showBack) {
  document.getElementById('headerTitle').textContent = title;
  document.getElementById('headerBack').style.display = showBack ? '' : 'none';
  document.getElementById('headerRight').style.display = '';
}

function pushScreen(toId, title) {
  const cur = document.querySelector('.screen.active');
  screenStack.push({ screenId: cur?.id, title: document.getElementById('headerTitle').textContent });
  showScreen(toId);
  updateHeader(title, true);
  document.getElementById('headerRight').innerHTML =
    `<button class="user-avatar" id="userAvatar" onclick="showLogoutModal()">` +
    (S.user?.displayName?.charAt(0) || '?') + `</button>`;
}

function goBack() {
  if (screenStack.length === 0) return;
  const prev = screenStack.pop();
  showScreen(prev.screenId);
  updateHeader(prev.title, screenStack.length > 0);
  document.getElementById('headerRight').innerHTML =
    `<button class="user-avatar" id="userAvatar" onclick="showLogoutModal()">` +
    (S.user?.displayName?.charAt(0) || '?') + `</button>`;
  if (prev.screenId === 'screenResident') {
    // 削除ボタンを再設定
    setResidentHeader();
    renderRecords();
  }
}

function setResidentHeader() {
  const right = document.getElementById('headerRight');
  right.innerHTML =
    `<button class="header-btn" onclick="showDeleteResidentModal('${S.currentResident?.id}')" style="font-size:18px">🗑</button>` +
    `<button class="user-avatar" id="userAvatar" onclick="showLogoutModal()">` +
    (S.user?.displayName?.charAt(0) || '?') + `</button>`;
}

// ============================
// 利用者管理
// ============================
async function loadResidents() {
  showLoading('読み込み中...');
  try {
    S.residents = await api('/api/residents');
  } catch (e) {
    showToast(e.message, 'error');
    S.residents = [];
  } finally { hideLoading(); }
  renderResidents();
}

function renderResidents() {
  const list  = document.getElementById('residentList');
  const empty = document.getElementById('homeEmpty');
  if (!S.residents.length) {
    list.innerHTML = ''; empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = S.residents.map(r => `
    <div class="resident-card" onclick="openResident('${r.id}')">
      <div class="resident-avatar">${r.name.charAt(0)}</div>
      <div class="resident-info">
        <div class="resident-name">${h(r.name)}</div>
        <div class="resident-meta">${r.room ? h(r.room) + ' ・ ' : ''}${h(r.defaultMealTexture)}</div>
      </div>
      <div class="resident-arrow">›</div>
    </div>
  `).join('');
}

function showAddResident() {
  document.getElementById('addName').value = '';
  document.getElementById('addRoom').value = '';
  document.getElementById('addTexture').value = '普通食';
  pushScreen('screenAddResident', '利用者追加');
}

async function addResident() {
  const name = document.getElementById('addName').value.trim();
  if (!name) { showToast('氏名を入力してください', 'error'); return; }
  showLoading('登録中...');
  try {
    await api('/api/residents', { method:'POST', body: JSON.stringify({
      name, room: document.getElementById('addRoom').value.trim(),
      defaultMealTexture: document.getElementById('addTexture').value,
    })});
    await loadResidents();
    goBack();
    showToast('利用者を登録しました', 'success');
  } catch (e) { showToast(e.message, 'error'); }
  finally { hideLoading(); }
}

let delResId = null;
function showDeleteResidentModal(id) {
  delResId = id;
  openModal('deleteResidentModal');
}
async function confirmDeleteResident() {
  closeModal('deleteResidentModal');
  if (!delResId) return;
  showLoading('削除中...');
  try {
    await api('/api/residents/' + delResId, { method:'DELETE' });
    await loadResidents();
    if (S.currentResident?.id === delResId) {
      screenStack.length = 0;
      showScreen('screenHome');
      updateHeader('介護食事記録', false);
    }
    showToast('削除しました');
  } catch (e) { showToast(e.message, 'error'); }
  finally { hideLoading(); delResId = null; }
}

// ============================
// 利用者詳細
// ============================
async function openResident(id) {
  const r = S.residents.find(r => r.id === id);
  if (!r) return;
  S.currentResident = r;
  pushScreen('screenResident', r.name);
  setResidentHeader();
  showLoading('読み込み中...');
  try {
    S.records = await api('/api/records/' + id);
  } catch { S.records = []; }
  finally { hideLoading(); }
  renderRecords();
}

function renderRecords() {
  const list  = document.getElementById('recordList');
  const empty = document.getElementById('residentEmpty');
  const stats = document.getElementById('residentStats');
  if (!S.records.length) {
    list.innerHTML = ''; empty.style.display = '';
    stats.innerHTML = ''; return;
  }
  empty.style.display = 'none';

  // 今日の統計
  const today = new Date().toDateString();
  const todayRec = S.records.filter(r => new Date(r.createdAt).toDateString() === today);
  if (todayRec.length) {
    const avg = Math.round(todayRec.reduce((a, r) => a + r.percentage, 0) / todayRec.length);
    stats.innerHTML = `
      <div class="stat-chip">今日: <strong>${todayRec.length}件</strong></div>
      <div class="stat-chip">平均摂取: <strong>${avg}%</strong></div>
    `;
  } else { stats.innerHTML = ''; }

  list.innerHTML = S.records.map(rec => {
    const dt = new Date(rec.createdAt);
    const ds = `${dt.getMonth()+1}/${dt.getDate()} ${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
    const cc = rec.percentage >= 100 ? 'c100' : rec.percentage >= 75 ? 'c75'
             : rec.percentage >= 50 ? 'c50'  : rec.percentage >= 25 ? 'c25' : 'c10';
    const thumb = rec.thumbnailBase64
      ? `<img class="record-thumb" src="${rec.thumbnailBase64}" alt="食事" loading="lazy">`
      : `<div class="record-thumb-ph">🍱</div>`;
    return `
      <div class="record-card">
        <div class="record-card-header">
          <span class="mealtime-badge">${h(rec.mealTime)}</span>
          <span class="record-date">${ds}</span>
          <button class="record-del" onclick="deleteRecord('${S.currentResident.id}','${rec.id}')">✕</button>
        </div>
        <div class="record-body">
          ${thumb}
          <div class="record-details">
            <div class="amount-label">
              <span class="amount-text">${h(rec.amount)}</span>
              <span class="amount-pct">${rec.percentage}%</span>
            </div>
            <div class="amount-bar"><div class="amount-fill ${cc}" style="width:${rec.percentage}%"></div></div>
            <div class="record-texture">${h(rec.mealTexture)}</div>
            ${rec.aiComment ? `<div class="record-comment">${h(rec.aiComment)}</div>` : ''}
            ${rec.note ? `<div class="record-note">📝 ${h(rec.note)}</div>` : ''}
          </div>
        </div>
      </div>`;
  }).join('');
}

async function deleteRecord(residentId, recordId) {
  if (!confirm('この記録を削除しますか？')) return;
  showLoading('削除中...');
  try {
    await api(`/api/records/${residentId}/${recordId}`, { method:'DELETE' });
    S.records = await api('/api/records/' + residentId);
    renderRecords();
    showToast('削除しました');
  } catch (e) { showToast(e.message, 'error'); }
  finally { hideLoading(); }
}

// ============================
// 新規記録
// ============================
function showNewRecord() {
  if (!S.currentResident) return;
  S.photoFull = S.photoThumb = S.aiResult = null;
  S.selectedIdx = null;

  document.getElementById('photoPreview').style.display = 'none';
  document.getElementById('photoPlaceholder').style.display = '';
  document.getElementById('photoBtnRow').style.display = 'none';
  document.getElementById('aiResult').classList.remove('show');
  document.getElementById('newNote').value = '';

  document.getElementById('newMealTexture').value = S.currentResident.defaultMealTexture || '普通食';

  const h2 = new Date().getHours();
  document.getElementById('newMealTime').value =
    h2 < 10 ? '朝食' : h2 < 14 ? '昼食' : h2 < 17 ? 'おやつ' : '夕食';

  buildAmountSelector();
  pushScreen('screenNewRecord', '食事記録を追加');
}

function buildAmountSelector() {
  document.getElementById('amountSelector').innerHTML = AMOUNTS.map((a, i) => `
    <div class="amount-opt" id="aopt${i}" onclick="selectAmount(${i})">
      <div class="amount-opt-lbl">${a.label}</div>
      <div class="amount-opt-pct">${a.pct}%</div>
    </div>`).join('');
}

function selectAmount(idx) {
  AMOUNTS.forEach((_, i) => document.getElementById('aopt'+i)?.classList.toggle('selected', i === idx));
  S.selectedIdx = idx;
}

function triggerCamera() {
  document.getElementById('cameraInput').value = '';
  document.getElementById('cameraInput').click();
}

function onPhotoSelected(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      S.photoFull  = resizeCanvas(img, 1280, 0.85); // AI分析用
      S.photoThumb = resizeCanvas(img, 200,  0.75); // 保存用サムネイル
      document.getElementById('photoPreview').src = S.photoFull;
      document.getElementById('photoPreview').style.display = 'block';
      document.getElementById('photoPlaceholder').style.display = 'none';
      document.getElementById('photoBtnRow').style.display = 'flex';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function resizeCanvas(img, maxPx, quality) {
  let w = img.width, h = img.height;
  if (w > maxPx || h > maxPx) {
    if (w > h) { h = Math.round(h * maxPx / w); w = maxPx; }
    else       { w = Math.round(w * maxPx / h); h = maxPx; }
  }
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  c.getContext('2d').drawImage(img, 0, 0, w, h);
  return c.toDataURL('image/jpeg', quality);
}

async function analyzePhoto() {
  if (!S.photoFull) { showToast('写真を撮影してください', 'error'); return; }
  showLoading('Gemini が食事量を分析中...');
  try {
    const result = await api('/api/analyze', {
      method:'POST',
      body: JSON.stringify({
        imageBase64: S.photoFull,
        mealTexture: document.getElementById('newMealTexture').value,
        mealTime:    document.getElementById('newMealTime').value,
      }),
    });
    S.aiResult = result;
    showAiResult(result);
    // 量セレクタに反映
    const idx = AMOUNTS.findIndex(a => a.label === result.amount);
    selectAmount(idx >= 0 ? idx :
      AMOUNTS.reduce((b, a, i) => Math.abs(a.pct - result.percentage) < Math.abs(AMOUNTS[b].pct - result.percentage) ? i : b, 0));
    showToast('AI分析完了', 'success');
  } catch (e) { showToast(e.message, 'error'); }
  finally { hideLoading(); }
}

function showAiResult(r) {
  document.getElementById('aiResult').classList.add('show');
  document.getElementById('aiAmount').textContent = r.amount || '—';
  document.getElementById('aiPct').textContent = `摂取量: 約${r.percentage}%`;
  document.getElementById('aiComment').textContent = r.comment || '';
  const fill = document.getElementById('aiBarFill');
  const p = r.percentage || 0;
  fill.style.width = p + '%';
  fill.className = 'ai-bar-fill ' +
    (p >= 100 ? 'c100' : p >= 75 ? 'c75' : p >= 50 ? 'c50' : p >= 25 ? 'c25' : 'c10');
}

async function saveRecord() {
  if (S.selectedIdx === null) { showToast('摂取量を選択してください', 'error'); return; }
  if (!S.currentResident) return;
  showLoading('保存中...');
  try {
    await api('/api/records', {
      method:'POST',
      body: JSON.stringify({
        residentId:     S.currentResident.id,
        mealTime:       document.getElementById('newMealTime').value,
        mealTexture:    document.getElementById('newMealTexture').value,
        thumbnailBase64: S.photoThumb || null,
        amount:         AMOUNTS[S.selectedIdx].label,
        percentage:     AMOUNTS[S.selectedIdx].pct,
        aiComment:      S.aiResult?.comment || '',
        note:           document.getElementById('newNote').value.trim(),
      }),
    });
    S.records = await api('/api/records/' + S.currentResident.id);
    goBack();
    showToast('記録を保存しました', 'success');
  } catch (e) { showToast(e.message, 'error'); }
  finally { hideLoading(); }
}

// ============================
// 音声入力
// ============================
let recognition = null;
function initVoice() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  document.getElementById('voiceSupported').style.display = '';
  document.getElementById('voiceBtn').style.display = '';

  recognition = new SR();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onstart = () => {
    document.getElementById('voiceBtn').classList.add('recording');
    showToast('🎤 話してください...');
  };
  recognition.onresult = e => {
    const text = e.results[0][0].transcript.trim();
    // 量のキーワード認識
    const kw = {'全量':0,'三分の四':1,'半量':2,'四分の一':3,'ほとんど食べず':4,'食べず':5};
    const matched = Object.entries(kw).find(([k]) => text.includes(k));
    if (matched) {
      selectAmount(matched[1]);
      showToast(`「${matched[0]}」を選択`, 'success');
    } else {
      const ta = document.getElementById('newNote');
      ta.value += (ta.value ? ' ' : '') + text;
      showToast('入力: ' + text);
    }
    document.getElementById('voiceBtn').classList.remove('recording');
  };
  recognition.onerror = e => {
    document.getElementById('voiceBtn').classList.remove('recording');
    if (e.error !== 'no-speech') showToast('音声認識エラー: ' + e.error, 'error');
  };
  recognition.onend = () => {
    document.getElementById('voiceBtn').classList.remove('recording');
  };
}

function toggleVoice() {
  if (!recognition) { showToast('音声入力は非対応です', 'error'); return; }
  const btn = document.getElementById('voiceBtn');
  if (btn.classList.contains('recording')) {
    recognition.stop();
  } else {
    try { recognition.start(); }
    catch { /* already running */ }
  }
}

// ============================
// UI ユーティリティ
// ============================
function showLoading(text = '処理中...') {
  document.getElementById('loadingText').textContent = text;
  document.getElementById('loadingOverlay').classList.add('show');
}
function hideLoading() { document.getElementById('loadingOverlay').classList.remove('show'); }

let toastT = null;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 2800);
}
function openModal(id)  { document.getElementById(id).classList.add('show'); }
function closeModal(id) { document.getElementById(id).classList.remove('show'); }
function h(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;')
                  .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function pad(n) { return String(n).padStart(2,'0'); }

// 起動
initFirebase();
</script>
</body>
</html>
